<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <title>Banana Ball Showcase</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS v5.3.8 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://use.typekit.net/tgz2myl.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg custom-navbar">
      <div class="container-fluid">
        <a class="navbar-brand ms-2" href="index.html">
          <img src="logo.png" class="logo-img" alt="Logo" />
        </a>

        <button
          class="navbar-toggler"
          data-bs-toggle="collapse"
          data-bs-target="#nav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="nav">
          <div class="navbar-nav me-3">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link active" href="about.html">About</a>
            <a class="nav-link" href="collections.html">Collections</a>
          </div>
        </div>
      </div>
    </nav>
    <main class="container py-5">
      <!--Filter-->
      <div id="filters" class="container my-3 d-flex gap-2 flex-wrap">
        <select id="teamFilter" class="form-select w-auto">
          <option value="all">All Teams</option>
          <option value="savannah">Savannah Bananas</option>
          <option value="party">Party Animals</option>
          <option value="fire">Firefighters</option>
          <option value="texas">Texas Tailgaters</option>
          <option value="coco">Coco Locos</option>
          <option value="clowns">Clowns</option>
        </select>

        <select id="sortNumber" class="form-select w-auto">
          <option value="none">Sort Number</option>
          <option value="low">Low → High</option>
          <option value="high">High → Low</option>
        </select>

        <button id="firstAZ" class="btn btn-warning">First A–Z</button>
        <button id="lastAZ" class="btn btn-warning">Last A–Z</button>

        <button id="resetFilters" class="btn btn-secondary">Reset</button>
      </div>
      <!-- Page title -->
      <h2 class="team-title">Savannah Bananas</h2>
      <div id="savannah" class="row g-3 mb-5"></div>

      <h2 class="team-title">Party Animals</h2>
      <div id="party" class="row g-3 mb-5"></div>

      <h2 class="team-title">Firefighters</h2>
      <div id="fire" class="row g-3 mb-5"></div>

      <h2 class="team-title">Texas Tailgaters</h2>
      <div id="texas" class="row g-3 mb-5"></div>

      <h2 class="team-title">Coco Locos</h2>
      <div id="coco" class="row g-3 mb-5"></div>

      <h2 class="team-title">Clowns</h2>
      <div id="clowns" class="row g-3 mb-5"></div>

      <div class="modal fade" id="playerModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="modalName">Special Talent Name</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
              ></button>
            </div>

            <div class="modal-body">
              <h4 id="modalTalent"></h4>
            </div>
          </div>
        </div>
      </div>
    </main>
    <!-- FOOTER -->
    <footer class="text-center p-3 custom-footer">
      <h6>Banana Ball Showcase © 2026 All rights reserved.</h6>
      <a href="https://bananaball.com/">Visit Banana Ball Website</a>
    </footer>
    <!-- Bootstrap JavaScript Bundle (includes Popper) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="js/players.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
